$kind: http-request
name: Create Location
method: POST
url: '{{baseUrl}}/locations'
description: '`name`, `latitude` (number), and `longitude` (number) are required.'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Lake District",
      "latitude": 54.4609,
      "longitude": -3.0886
    }
