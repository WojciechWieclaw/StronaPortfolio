$kind: http-request
name: Update Location
method: PUT
url: '{{baseUrl}}/locations/:id'
order: 4000
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Updated Location",
      "latitude": 54.4609,
      "longitude": -3.0886
    }
